version: "3.8"

networks:
  pre-event-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - pre-event-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - pre-event-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - pre-event-network

  db:
    image: mariadb:10.11
    container_name: vetautet-db-server
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d/
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: vetautet
    ports:
      - "3308:3306"
    networks:
      - pre-event-network

  redis:
    container_name: pre-event-redis
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6319:6379"
    networks:
      pre-event-network:
        aliases:
          - redis-master

  redis-slave-1:
    container_name: pre-event-redis-slave-1
    image: redis:7.2-alpine
    depends_on:
      - redis
    command: ["redis-server", "--replicaof", "redis-master", "6379", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6320:6379"
    networks:
      - pre-event-network

  redis-slave-2:
    container_name: pre-event-redis-slave-2
    image: redis:7.2-alpine
    depends_on:
      - redis
    command: ["redis-server", "--replicaof", "redis-master", "6379", "--appendonly", "yes", "--protected-mode", "no"]
    ports:
      - "6321:6379"
    networks:
      - pre-event-network

  redis-sentinel-1:
    container_name: pre-event-redis-sentinel-1
    image: redis:7.2-alpine
    depends_on:
      - redis
      - redis-slave-1
      - redis-slave-2
    command: ["/bin/sh", "-c", "cp /etc/redis-src/sentinel.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel"]
    volumes:
      - ./redis/sentinel-1.conf:/etc/redis-src/sentinel.conf:ro
    ports:
      - "26379:26379"
    networks:
      - pre-event-network

  redis-sentinel-2:
    container_name: pre-event-redis-sentinel-2
    image: redis:7.2-alpine
    depends_on:
      - redis
      - redis-slave-1
      - redis-slave-2
    command: ["/bin/sh", "-c", "cp /etc/redis-src/sentinel.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel"]
    volumes:
      - ./redis/sentinel-2.conf:/etc/redis-src/sentinel.conf:ro
    ports:
      - "26380:26380"
    networks:
      - pre-event-network

  redis-sentinel-3:
    container_name: pre-event-redis-sentinel-3
    image: redis:7.2-alpine
    depends_on:
      - redis
      - redis-slave-1
      - redis-slave-2
    command: ["/bin/sh", "-c", "cp /etc/redis-src/sentinel.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel"]
    volumes:
      - ./redis/sentinel-3.conf:/etc/redis-src/sentinel.conf:ro
    ports:
      - "26381:26381"
    networks:
      - pre-event-network

  prometheus:
    image: prom/prometheus:latest
    container_name: vetautet-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    networks:
      - pre-event-network

  grafana:
    image: grafana/grafana:latest
    container_name: vetautet-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - pre-event-network
