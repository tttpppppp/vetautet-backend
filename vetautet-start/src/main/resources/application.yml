server:
  port: ${PORT:8080}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:80}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:5}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:1000}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:2000}
  servlet:
    context-path: /api/v1

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3308/vetautet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6319}}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6319}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:}
        nodes: ${REDIS_SENTINEL_NODES:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: vetautet-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

# JWT Config
jwt:
  secret: ${JWT_SECRET:vetautet-dev-secret-key-must-be-at-least-256-bits-long}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

google:
  client-id: ${GOOGLE_CLIENT_ID:332753021792-6oneka96sagnuhi4n07gq0uetqu5583o.apps.googleusercontent.com}

ticket:
  qr:
    # Override in production so QR tokens use a secret independent from JWT.
    secret: ${TICKET_QR_SECRET:${jwt.secret}}

# Cloudinary Config
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

momo:
  endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
  partner-code: ${MOMO_PARTNER_CODE:}
  access-key: ${MOMO_ACCESS_KEY:}
  secret-key: ${MOMO_SECRET_KEY:}
  redirect-url: ${MOMO_REDIRECT_URL:http://localhost:5173/payment/momo-return}
  ipn-url: ${MOMO_IPN_URL:http://127.0.0.1:8080/api/v1/payments/momo/ipn}
  request-type: ${MOMO_REQUEST_TYPE:captureWallet}
  lang: ${MOMO_LANG:vi}

vnpay:
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  # Local sandbox demo config. Move these back to env variables before sharing/deploying.
  tmn-code: ${VNPAY_TMN_CODE:ITY6NNOC}
  hash-secret: ${VNPAY_HASH_SECRET:Q1D6OAHEJDIRCRFI3OD653QEQY4X5JTQ}
  return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment/vnpay-return}
  version: 2.1.0
  command: pay
  order-type: other
  locale: vn
  curr-code: VND
  expire-minutes: 15

resilience4j:
  circuitbreaker:
    instances:
      helloCircuit:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 3
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 1
        event-consumer-buffer-size: 20
      momoPayment:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        event-consumer-buffer-size: 50
  ratelimiter:
    instances:
      helloTest:
        register-health-indicator: true
        limit-for-period: 5
        limit-refresh-period: 1m
        timeout-duration: 0s
        event-consumer-buffer-size: 20
      authLogin:
        register-health-indicator: true
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 0s
        event-consumer-buffer-size: 50
      authOtp:
        register-health-indicator: true
        limit-for-period: 5
        limit-refresh-period: 1m
        timeout-duration: 0s
        event-consumer-buffer-size: 50
      tripSearch:
        register-health-indicator: true
        limit-for-period: 60
        limit-refresh-period: 1m
        timeout-duration: 0s
        event-consumer-buffer-size: 50
      bookingWrite:
        register-health-indicator: true
        limit-for-period: 20
        limit-refresh-period: 1m
        timeout-duration: 0s
        event-consumer-buffer-size: 50
      paymentCreate:
        register-health-indicator: true
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 0s
        event-consumer-buffer-size: 50

vetautet:
  cache:
    trip:
      # Set false before high-QPS benchmarks because per-request logging reduces throughput.
      log-local-cache: ${TRIP_LOCAL_CACHE_LOG_ENABLED:false}
  security:
    data-encryption-key: ${DATA_ENCRYPTION_KEY:${jwt.secret}}
  kafka:
    producer:
      enabled: ${KAFKA_PRODUCER_ENABLED:true}
  outbox:
    publisher:
      enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
      fixed-delay-ms: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:500}
      batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:200}
      retry-delay-seconds: ${OUTBOX_PUBLISHER_RETRY_DELAY_SECONDS:5}
      send-timeout-seconds: ${OUTBOX_PUBLISHER_SEND_TIMEOUT_SECONDS:10}
    cleanup:
      enabled: ${OUTBOX_CLEANUP_ENABLED:true}
      fixed-delay-ms: ${OUTBOX_CLEANUP_FIXED_DELAY_MS:300000}
      retention-hours: ${OUTBOX_CLEANUP_RETENTION_HOURS:168}
      batch-size: ${OUTBOX_CLEANUP_BATCH_SIZE:1000}
  mail:
    enabled: ${MAIL_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
    ratelimiters:
      enabled: true
  metrics:
    tags:
      application: vetautet-api
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:WARN}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG_LEVEL:WARN}
    org.springframework.kafka: ${KAFKA_LOG_LEVEL:WARN}
    org.apache.kafka: ${KAFKA_CLIENT_LOG_LEVEL:WARN}
